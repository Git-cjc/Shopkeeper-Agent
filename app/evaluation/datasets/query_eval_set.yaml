    expected_metrics: [GMV]
    expected_values: [dim_product.brand.苹果]
    tags: [filter, brand, gmv]

  - case_id: q007_gmv_phone_category
    question: 手机数码品类的GMV是多少？
    reference_sql: |
      SELECT SUM(f.order_amount) AS gmv
      FROM fact_order AS f
      JOIN dim_product AS p ON f.product_id = p.product_id
      WHERE p.category = '手机数码';
    expected_tables: [fact_order, dim_product]
    expected_columns: [fact_order.order_amount, dim_product.category]
    expected_metrics: [GMV]
    expected_values: [dim_product.category.手机数码]
    tags: [filter, category, gmv]

  - case_id: q008_top3_brands_by_gmv
    question: 按GMV排序，品牌前三名是什么？
    reference_sql: |
      SELECT p.brand, SUM(f.order_amount) AS gmv
      FROM fact_order AS f
      JOIN dim_product AS p ON f.product_id = p.product_id
      GROUP BY p.brand
      ORDER BY gmv DESC
      LIMIT 3;
    expected_tables: [fact_order, dim_product]
    expected_columns: [fact_order.order_amount, dim_product.brand]
    expected_metrics: [GMV]
    expected_values: []
    tags: [group_by, topn, brand, gmv]

  - case_id: q009_top5_categories_by_quantity
    question: 按销量排序，品类前五名是什么？
    reference_sql: |
      SELECT p.category, SUM(f.order_quantity) AS total_quantity
      FROM fact_order AS f
      JOIN dim_product AS p ON f.product_id = p.product_id
      GROUP BY p.category
      ORDER BY total_quantity DESC
      LIMIT 5;
    expected_tables: [fact_order, dim_product]
    expected_columns: [fact_order.order_quantity, dim_product.category]
    expected_metrics: []
    expected_values: []
    tags: [group_by, topn, category, quantity]

  - case_id: q010_gmv_q1_by_region
    question: 统计 Q1 各地区的GMV。
    reference_sql: |
      SELECT r.region_name, SUM(f.order_amount) AS gmv
      FROM fact_order AS f
      JOIN dim_region AS r ON f.region_id = r.region_id
      JOIN dim_date AS d ON f.date_id = d.date_id
      WHERE d.quarter = 'Q1'
      GROUP BY r.region_name;
    expected_tables: [fact_order, dim_date, dim_region]
    expected_columns:
      - fact_order.order_amount
      - dim_date.quarter
      - dim_region.region_name
    expected_metrics: [GMV]
    expected_values: [dim_date.quarter.Q1]
    tags: [group_by, time, region, gmv]

  - case_id: q011_distinct_customers_by_member_level
    question: 按会员等级统计下单用户数。
    reference_sql: |
      SELECT c.member_level, COUNT(DISTINCT f.customer_id) AS customer_count
      FROM fact_order AS f
      JOIN dim_customer AS c ON f.customer_id = c.customer_id
      GROUP BY c.member_level;
    expected_tables: [fact_order, dim_customer]
    expected_columns: [fact_order.customer_id, dim_customer.member_level]
    expected_metrics: []
    expected_values: []
    tags: [group_by, member_level, distinct_user]

