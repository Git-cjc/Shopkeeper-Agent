cases:
  - case_id: q001_total_gmv
    question: 总GMV是多少？
    reference_sql: |
      SELECT SUM(order_amount) AS gmv
      FROM fact_order;
    expected_tables: [fact_order]
    expected_columns: [fact_order.order_amount]
    expected_metrics: [GMV]
    expected_values: []
    tags: [aggregate, metric, gmv]

  - case_id: q002_total_sales_quantity
    question: 总销量是多少？
    reference_sql: |
      SELECT SUM(order_quantity) AS total_quantity
      FROM fact_order;
    expected_tables: [fact_order]
    expected_columns: [fact_order.order_quantity]
    expected_metrics: []
    expected_values: []
    tags: [aggregate, quantity]

  - case_id: q003_distinct_customer_count
    question: 下单用户数有多少？
    reference_sql: |
      SELECT COUNT(DISTINCT customer_id) AS customer_count
      FROM fact_order;
    expected_tables: [fact_order]
    expected_columns: [fact_order.customer_id]
    expected_metrics: []
    expected_values: []
    tags: [aggregate, distinct_user]

  - case_id: q004_gmv_east_china
    question: 华东地区的GMV是多少？
    reference_sql: |
      SELECT SUM(f.order_amount) AS gmv
      FROM fact_order AS f
      JOIN dim_region AS r ON f.region_id = r.region_id
      WHERE r.region_name = '华东';
    expected_tables: [fact_order, dim_region]
    expected_columns: [fact_order.order_amount, dim_region.region_name]
    expected_metrics: [GMV]
    expected_values: [dim_region.region_name.华东]
    tags: [filter, region, gmv]

  - case_id: q005_gmv_gold_members
    question: 黄金会员的GMV是多少？
    reference_sql: |
      SELECT SUM(f.order_amount) AS gmv
      FROM fact_order AS f
      JOIN dim_customer AS c ON f.customer_id = c.customer_id
      WHERE c.member_level = '黄金';
    expected_tables: [fact_order, dim_customer]
    expected_columns: [fact_order.order_amount, dim_customer.member_level]
    expected_metrics: [GMV]
    expected_values: [dim_customer.member_level.黄金]
    tags: [filter, member_level, gmv]

  - case_id: q006_gmv_apple_brand
    question: 苹果品牌的GMV是多少？
    reference_sql: |
      SELECT SUM(f.order_amount) AS gmv
      FROM fact_order AS f
      JOIN dim_product AS p ON f.product_id = p.product_id
